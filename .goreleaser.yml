version: 2

project_name: continuum

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: ctx
    main: ./cmd/
    binary: ctx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    hooks:
      post:
        - sh -c "if command -v codesign >/dev/null 2>&1; then codesign --force --sign - '{{ .Path }}' 2>/dev/null || true; fi"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "ctx_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - install.sh
      - templates

checksum:
  name_template: "ctx_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  draft: true
  prerelease: auto
  name_template: "{{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - name: continuum
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}false{{ else }}true{{ end }}"
    repository:
      owner: simoneaveotti
      name: homebrew-continuum
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/simoneaveotti/continuum"
    description: "Terminal-first context orchestration for AI-assisted development."
    license: "MIT"
    install: |
      bin.install "ctx"
      pkgshare.install "templates"
    test: |
      system "#{bin}/ctx", "--version"
